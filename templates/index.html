<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>App Gallery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 1rem;
      padding: 1rem;
    }
    .app-card {
      text-align: center;
      cursor: pointer;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.2s;
    }
    .app-card:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .app-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }
    .app-card .title {
      font-size: 0.9rem;
      padding: 0.5rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body class="bg-light">
  <div class="container mt-4">
    <h1 class="text-center mb-4">📱 App Gallery</h1>
    <button class="btn btn-primary m-3" onclick="openModal()">+ Add App</button>
    
    <div class="grid-container">
      {% for app in apps %}
        <a href="{{ url_for('app_detail', app_id=app.id) }}" class="text-decoration-none text-dark">
          <div class="app-card">
            <img src="{{ app.thumbnail }}" alt="{{ app.title }}" onerror="this.src='https://via.placeholder.com/120?text=No+Image'"/>
            <div class="title" title="{{ app.title }}">{{ app.title }}</div>
          </div>
        </a>
      {% endfor %}
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add App</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="addForm">
            <div class="mb-3">
              <label>App ID or Play Store URL</label>
              <input type="text" class="form-control" id="appInput" placeholder="com.whatsapp or https://..." required>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="saveApp()">Add</button>
        </div>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>   
  <script>
    // Auto-open modal if ?show_add_modal=true
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('show_add_modal') === 'true') {
      var modal = new bootstrap.Modal(document.getElementById('addModal'));
      modal.show();
    }

    function openModal() {
      document.getElementById('appInput').value = '';
      var modal = new bootstrap.Modal(document.getElementById('addModal'));
      modal.show();
    }

    // Extract app ID from URL on paste
    document.getElementById('appInput').addEventListener('paste', function(e) {
      setTimeout(() => {
        let val = e.target.value.trim();
        if (val.includes('play.google.com')) {
          try {
            const url = new URL(val);
            const appId = url.searchParams.get('id');
            if (appId) e.target.value = appId;
          } catch (err) {
            console.error('Invalid URL');
          }
        }
      }, 100);
    });

    // Save via XHR
    function saveApp() {
      const input = document.getElementById('appInput').value.trim();
      if (!input) return;

      let appId = input;
      // Extract from URL if needed
      if (input.includes('play.google.com')) {
        try {
          const url = new URL(input);
          appId = url.searchParams.get('id');
        } catch (err) {
          alert('Invalid URL');
          return;
        }
      }

      if (!appId) {
        alert('Could not extract app ID');
        return;
      }

      fetch(`/save/${encodeURIComponent(appId)}`)
        .then(r => r.json())
        .then(data => {
          alert('Added: ' + appId);
          location.reload();
        })
        .catch(err => {
          alert('Error: ' + err.message);
        });
    }
  </script>
</body>
</html>
