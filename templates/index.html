<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            padding: 1rem;
        }

        .app-card {
            text-align: center;
            cursor: pointer;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .app-card:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .app-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        .app-card .title {
            font-size: 0.9rem;
            padding: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container mt-4">
        <h1 class="text-center mb-4">📱 App Gallery</h1>
        <div class="grid-container">
            {% for app in apps %}
            <a href="{{ url_for('app_detail', app_id=app.id) }}" class="text-decoration-none text-dark">
                <div class="app-card">
                    <img src="{{ app.thumbnail }}" alt="{{ app.title }}"
                        onerror="this.src='https://via.placeholder.com/120?text=No+Image'" />
                    <div class="title" title="{{ app.title }}">{{ app.title }}</div>
                </div>
            </a>
            {% endfor %}
        </div>
    </div>
</body>

</html>
