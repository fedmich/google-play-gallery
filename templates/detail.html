<!-- templates/detail.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ app.title }} - Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light">
    <div class="container mt-5">
        <a href="{{ url_for('index') }}" class="btn btn-secondary mb-3">&larr; Back</a>
        <div class="card shadow">
            <div class="row g-0">
                <div class="col-md-4 text-center p-3">
                    <img src="{{ app.icon }}" class="img-fluid rounded" alt="{{ app.title }}"
                        style="max-height: 300px;">
                </div>
                <div class="col-md-8">
                    <div class="card-body">
                        <h2 class="card-title">{{ app.title }}</h2>
                        <p class="card-text"><strong>Developer:</strong> {{ app.developer }}</p>
                        <p class="card-text"><strong>Score:</strong> ⭐ {{ app.score }}</p>
                        <p class="card-text"><strong>Installs:</strong> {{ app.installs }}</p>
                        <p class="card-text"><strong>Description:</strong><br>{{ app.description[:500] }}...</p>
                        <a href="https://play.google.com/store/apps/details?id={{ app.appId }}" target="_blank"
                            class="btn btn-primary">View on Play Store</a>
                    </div>
                </div>
            </div>
        </div>


        <!-- Screenshots -->
        {% if app.screenshots %}
        <h3 class="mt-4">Screenshots</h3>
        <div class="row" id="screenshot-thumbnails">
            {% for img in app.screenshots %}
            <div class="col-6 col-md-4 col-lg-3 mb-3">
                <img src="{{ img }}" class="img-fluid rounded screenshot-thumb" alt="Screenshot"
                    onclick="openLightbox({{ loop.index0 }})">
            </div>
            {% endfor %}
        </div>
        {% endif %}

        
        
    </div>


    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1050; justify-content: center; align-items: center; flex-direction: column;">
        <span class="close-btn"
            style="position: absolute; top: 20px; right: 30px; color: #fff; font-size: 30px; cursor: pointer; z-index: 1051;"
            onclick="closeLightbox()">&times;</span>
        <div class="lightbox-content"
            style="position: relative; width: 90%; height: 80vh; display: flex; justify-content: center; align-items: center;">
            <img id="lightbox-img" style="max-width: 100%; max-height: 100%; object-fit: contain;">
        </div>
        <button id="prev-btn" class="nav-btn"
            style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #fff; font-size: 30px; background: none; border: none; cursor: pointer;">&#10094;</button>
        <button id="next-btn" class="nav-btn"
            style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: #fff; font-size: 30px; background: none; border: none; cursor: pointer;">&#10095;</button>
    </div>

    <script>
        const screenshots = {{ app.screenshots | tojson }};
        let currentIndex = 0;
      
        function openLightbox(index) {
          currentIndex = index;
          document.getElementById('lightbox-img').src = screenshots[currentIndex] + '=w2560-h1440-rw';
          document.getElementById('lightbox').style.display = 'flex';
          document.body.style.overflow = 'hidden';
      
          // Prevent scroll
          document.addEventListener('touchmove', preventScroll, { passive: false });
        }
      
        function closeLightbox() {
          document.getElementById('lightbox').style.display = 'none';
          document.body.style.overflow = 'auto';
          document.removeEventListener('touchmove', preventScroll);
        }
      
        function showImage(index) {
          currentIndex = (index + screenshots.length) % screenshots.length;
          document.getElementById('lightbox-img').src = screenshots[currentIndex] + '=w2560-h1440-rw';
        }
      
        function nextImage() {
          showImage(currentIndex + 1);
        }
      
        function prevImage() {
          showImage(currentIndex - 1);
        }
      
        function preventScroll(e) {
          e.preventDefault();
        }
      
        // Touch swipe
        let touchStartX = 0;
        document.getElementById('lightbox').addEventListener('touchstart', e => {
          touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });
      
        document.getElementById('lightbox').addEventListener('touchend', e => {
          const touchEndX = e.changedTouches[0].screenX;
          if (touchStartX - touchEndX > 50) nextImage();
          if (touchStartX - touchEndX < -50) prevImage();
        }, { passive: true });
      
        // Keyboard navigation
        document.addEventListener('keydown', e => {
          if (document.getElementById('lightbox').style.display === 'none') return;
          if (e.key === 'Escape') closeLightbox();
          if (e.key === 'ArrowRight') nextImage();
          if (e.key === 'ArrowLeft') prevImage();
        });
      
        // Button events
        document.getElementById('next-btn').onclick = nextImage;
        document.getElementById('prev-btn').onclick = prevImage;
      </script>   


</body>

</html>
