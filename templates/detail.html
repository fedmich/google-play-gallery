<!-- templates/detail.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ app.title }} - Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class="bg-light">
    <div class="container mt-5">
        <a href="{{ url_for('index') }}" class="btn btn-secondary mb-3">&larr; Back</a>
        <div class="card shadow">
            <div class="row g-0">
                <div class="col-md-4 text-center p-3">
                    <img src="{{ app.icon }}" class="img-fluid rounded" alt="{{ app.title }}"
                        style="max-height: 300px;">
                </div>
                <div class="col-md-8">
                    <div class="card-body">
                        <h2 class="card-title">{{ app.title }}</h2>
                        <p class="card-text"><strong>Developer:</strong> {{ app.developer }}</p>
                        <p class="card-text"><strong>Score:</strong> ⭐ {{ app.score }}</p>
                        <p class="card-text"><strong>Installs:</strong> {{ app.installs }}</p>
                        <p class="card-text"><strong>Description:</strong><br>{{ app.description[:500] }}...</p>
                        <a href="https://play.google.com/store/apps/details?id={{ app.appId }}" target="_blank"
                            class="btn btn-primary">View on Play Store</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Screenshots -->
        {% if app.screenshots %}
        <h3 class="mt-4">Screenshots</h3>
        <div class="row">
            {% for img in app.screenshots %}
            <div class="col-6 col-md-4 col-lg-3 mb-3">
                <img src="{{ img }}" class="img-fluid rounded" alt="Screenshot">
            </div>
            {% endfor %}
        </div>
        {% endif %}
    </div>
</body>

</html>
